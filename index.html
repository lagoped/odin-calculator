<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>

<body>
    <div class="calculator-body">
        <div class="calculator-screen">
            <div class="calculator-screen-data">
                <div id="current-equation"></div>
                <div id="equation-result"></div>
            </div>
            <div id="current-input" class="calculator-screen-input"></div>
        </div>

        <div class="calculator-function-buttons">
            <button class="function-button" onclick="resetCalculatorData()">CE</button>
            <button class="function-button" onclick="backspaceClick()">Backspace</button>
        </div>

        <div class="calculator-buttons">
            <div class="calculator-buttons-column">
                <button class="calculator-button number-button" onclick="numberButtonClick(7)">7</button>
                <button class="calculator-button number-button" onclick="numberButtonClick(4)">4</button>
                <button class="calculator-button number-button" onclick="numberButtonClick(1)">1</button>
                <button class="calculator-button number-button" onclick="numberButtonClick(0)">0</button>
            </div>

            <div class="calculator-buttons-column">
                <button class="calculator-button number-button" onclick="numberButtonClick(8)">8</button>
                <button class="calculator-button number-button" onclick="numberButtonClick(5)">5</button>
                <button class="calculator-button number-button" onclick="numberButtonClick(2)">2</button>
                <button class="calculator-button" disabled></button>
            </div>

            <div class="calculator-buttons-column">
                <button class="calculator-button number-button" onclick="numberButtonClick(9)">9</button>
                <button class="calculator-button number-button" onclick="numberButtonClick(6)">6</button>
                <button class="calculator-button number-button" onclick="numberButtonClick(3)">3</button>
                <button class="calculator-button equal-button" onclick="equalButtonClick()">=</button>
            </div>

            <div class="calculator-buttons-column">
                <button class="calculator-button operator-button" onclick="operationButtonClick('/')">/</button>
                <button class="calculator-button operator-button" onclick="operationButtonClick('*')">X</button>
                <button class="calculator-button operator-button" onclick="operationButtonClick('-')">-</button>
                <button class="calculator-button operator-button" onclick="operationButtonClick('+')">+</button>
            </div>

        </div>
    </div>
</body>
<script src="scripts/calculator.js"></script>

</html>
